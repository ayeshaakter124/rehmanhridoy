<!-- About Section -->
<section id="about" class="py-24 bg-surface relative overflow-hidden">
    <!-- Decorative Glow -->
    <div class="absolute top-1/4 left-0 w-96 h-96 bg-primary/10 rounded-full blur-[120px] -z-10 animate-pulse"></div>
    <div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-accent/5 rounded-full blur-[150px] -z-10"></div>
    
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col lg:flex-row gap-16 items-center">
            
            <!-- Image Column -->
            <div class="w-full lg:w-5/12 animate-on-scroll">
                <div class="relative group">
                    <div class="absolute -inset-4 bg-gradient-to-tr from-primary to-accent opacity-30 blur-2xl group-hover:opacity-50 transition-opacity duration-500 rounded-2xl"></div>
                    <img src="{{image}}" alt="Profile" class="relative rounded-2xl shadow-xl w-full object-cover aspect-[4/5] z-10 filter grayscale hover:grayscale-0 transition-all duration-700">
                    <div class="absolute -bottom-6 -right-6 bg-background p-6 rounded-2xl shadow-2xl z-20 border border-border hidden md:block animate-on-scroll">
                        <div class="flex items-center gap-4">
                            <i class="ph ph-film-strip text-4xl text-primary"></i>
                            <div>
                                <p class="text-sm text-textMuted font-medium uppercase tracking-wider">Since 2018</p>
                                <p class="font-bold text-lg">Delivering Excellence</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Content Column -->
            <div class="w-full lg:w-7/12 animate-on-scroll">
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-surface border border-border mb-6">
                    <span class="w-2 h-2 rounded-full bg-accent animate-ping"></span>
                    <span class="text-xs font-bold uppercase tracking-widest text-textMuted">Available for work</span>
                </div>
                
                <h2 class="text-4xl md:text-5xl font-heading font-extrabold mb-6">{{title}}</h2>
                
                <p class="text-lg text-textMuted leading-relaxed mb-10">
                    {{bio}}
                </p>
                
                <!-- Skills (Handled via JS dynamic injection) -->
                <div class="mb-12">
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <i class="ph ph-lightning text-accent"></i> Toolkit & Skills
                    </h3>
                    <div id="skills-container" class="flex flex-wrap gap-3">
                        <!-- JS Will inject skills here -->
                    </div>
                </div>
                
                <!-- Stats (Handled via JS dynamic injection) -->
                <div id="stats-container" class="grid grid-cols-2 md:grid-cols-3 gap-6 pt-8 border-t border-border">
                    <!-- JS Will inject stats here -->
                </div>
            </div>
        </div>
    </div>
</section>
