<!-- Testimonials Section -->
<section id="testimonials" class="py-24 bg-background relative overflow-hidden">
    <!-- Decorative blob -->
    <div class="absolute top-0 right-0 w-1/2 h-full bg-gradient-to-l from-primary/5 to-transparent -z-10"></div>
    
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-16 animate-on-scroll">
            <h2 class="text-4xl md:text-5xl font-heading font-extrabold mb-4">{{title}}</h2>
            <div class="w-24 h-1 bg-gradient-to-r from-primary to-accent mx-auto rounded-full"></div>
        </div>
        
        <div id="testimonials-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- JS Will inject testimonials here -->
        </div>
    </div>
</section>
